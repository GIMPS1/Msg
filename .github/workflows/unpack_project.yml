name: Unpack Project ZIP

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Locate ZIP file
        id: findzip
        shell: bash
        run: |
          echo "Repository files:"
          find . -maxdepth 2 -type f | sort
          ZIP_FILE=$(find . -maxdepth 2 -type f -iname "*.zip" | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in the repository root or one folder deep."
            echo "Upload wurzen_secure_github_apk_ready.zip first, then rerun this workflow."
            exit 1
          fi
          echo "Found ZIP: $ZIP_FILE"
          echo "zip_file=$ZIP_FILE" >> "$GITHUB_OUTPUT"

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract ZIP
        shell: bash
        run: |
          mkdir -p extracted
          unzip -o "${{ steps.findzip.outputs.zip_file }}" -d extracted
          echo "Extracted files:"
          find extracted -maxdepth 3 -type f | sort | head -200

      - name: Move files into repo root
        shell: bash
        run: |
          shopt -s dotglob
          # If the ZIP contains one top-level folder, move its contents. Otherwise move all extracted contents.
          ITEMS=(extracted/*)
          if [ ${#ITEMS[@]} -eq 1 ] && [ -d "${ITEMS[0]}" ]; then
            cp -R "${ITEMS[0]}"/* .
          else
            cp -R extracted/* .
          fi
          rm -rf extracted
          rm -f ./*.zip

      - name: Commit unpacked project
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Unpack Wurzen Secure project"
            git push
          fi
