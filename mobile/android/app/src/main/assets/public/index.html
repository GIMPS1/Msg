<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>PrivMsg</title><meta name='theme-color' content='#405cff'><link rel='manifest' href='/static/manifest.webmanifest'><link rel='icon' href='/static/icon.svg'><link rel='stylesheet' href='/static/style.css'></head><body>
<div class='shell'><header><h1>PrivMsg</h1><span id='who'>locked</span></header>
<section id='auth' class='card'><h2>Login</h2><input id='loginUser' placeholder='username'><input id='loginPass' type='password' placeholder='password'><button onclick='login()'>Login</button><p class='muted'>Default admin: admin / change-this-admin-password</p><hr><h2>Register by invite</h2><input id='invite' placeholder='invite code'><input id='regUser' placeholder='username'><input id='regName' placeholder='display name'><input id='regPass' type='password' placeholder='password, 10+ chars'><button onclick='register()'>Register</button></section>
<section id='app' hidden><div class='grid'><aside class='card'><h2>Chats</h2><button onclick='loadChats()'>Refresh</button><div id='chats'></div><hr><h3>New chat</h3><input id='chatTitle' placeholder='title'><input id='chatMembers' placeholder='member usernames, comma separated'><button onclick='newChat()'>Create</button><hr><h3>Conversation passphrase</h3><input id='passphrase' type='password' placeholder='shared secret for this chat'><p class='muted'>Messages are encrypted/decrypted in this browser using this passphrase. Server stores ciphertext only.</p></aside><main class='card'><h2 id='chatHeading'>No chat selected</h2><div id='msgs'></div><div class='send'><textarea id='msgText' placeholder='type message'></textarea><button onclick='sendMsg()'>Send encrypted</button></div></main><aside id='admin' class='card' hidden><h2>Admin</h2><button onclick='makeInvite()'>Create invite</button><pre id='inviteOut'></pre><button onclick='loadUsers()'>Load users</button><div id='users'></div><button onclick='loadAudit()'>Audit</button><div id='audit'></div></aside></div></section><pre id='notice'></pre></div><script src='/static/app.js'></script></body></html>
